      function addRows() {
        const name = document.getElementById("name").value;
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        const data = names[name];
        if (!data) {
          alert("Name not found");
          return;
        } else {
          for (let i = 0; i < data.length; i++) {
            const tr = document.createElement("tr");

            const tdName = document.createElement("td");
            tdName.innerText = name;

            const tdFile = document.createElement("td");
            tdFile.innerText = data[i].file;

            const tdSequence = document.createElement("td");
            tdSequence.innerText = data[i].sequence;

            // Append <td> elements to <tr>
            tr.appendChild(tdName);
            tr.appendChild(tdFile);
            tr.appendChild(tdSequence);

            // Append <tr> to <tbody>
            tbody.appendChild(tr);
          }
        }
      }
    </script>

      <input id="name" />
      <button onclick="addRows()">Search</button>
    </div>
    <table id="output-container" style="width: 100%; margin-top: 16px">
      <thead>
        <tr>
          <th>Name</th>
          <th>File No</th>
          <th>Sequence No</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </body>
